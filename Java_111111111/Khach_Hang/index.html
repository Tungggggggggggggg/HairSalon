<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mẫu phản hồi của khách hàng</title>
    <link rel="stylesheet" href="./styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="feedback-container">
      <h2>Chia sẻ phản hồi của bạn</h2>
      <p class="description">
        Chúng tôi đánh giá cao phản hồi của bạn! Vui lòng đánh giá trải nghiệm
        của bạn với chúng tôi.
      </p>
      <form id="feedback-form">
        <div class="form-group">
          <label for="name">Name:</label>
          <input
            type="text"
            id="name"
            name="name"
            required
            placeholder="Enter your name"
          />
        </div>
        <div class="form-group">
          <label for="email">Email:</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="Enter your email"
          />
        </div>
        <div class="form-group">
          <label for="rating">Đánh giá chúng tôi:</label>
          <div class="star-rating">
            <input type="radio" id="star5" name="rating" value="5" /><label
              for="star5"
              title="5 stars"
              >★</label
            >
            <input type="radio" id="star4" name="rating" value="4" /><label
              for="star4"
              title="4 stars"
              >★</label
            >
            <input type="radio" id="star3" name="rating" value="3" /><label
              for="star3"
              title="3 stars"
              >★</label
            >
            <input type="radio" id="star2" name="rating" value="2" /><label
              for="star2"
              title="2 stars"
              >★</label
            >
            <input type="radio" id="star1" name="rating" value="1" /><label
              for="star1"
              title="1 star"
              >★</label
            >
          </div>
        </div>
        <div class="form-group">
          <label for="comments">Bình luận:</label>
          <textarea
            id="comments"
            name="comments"
            rows="5"
            required
            placeholder="Tell us about your experience..."
          ></textarea>
        </div>
        <div class="form-group">
          <button type="submit">Gửi phản hồi</button>
        </div>
      </form>
      <div id="feedback-message"></div>
    </div>

    <script src="./scripts.js"></script>
  </body>
</html>
